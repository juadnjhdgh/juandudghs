<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Ti, Con Amor</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Playfair+Display:italic,wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fdf2f2;
            font-family: 'Playfair Display', serif;
            overflow: hidden;
            color: #5a3e3e;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            max-width: 80%;
            border: 1px solid #f2d7d7;
            animation: fadeIn 3s ease-in;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #b35d5d;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .signature {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #b35d5d;
            margin-top: 20px;
        }

        /* Corazones flotantes de fondo */
        .heart {
            position: absolute;
            color: #ffb7b7;
            font-size: 20px;
            user-select: none;
            pointer-events: none;
            animation: float 10s linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Para el amor de mi vida</h1>
        <p>
            Dicen que el mundo es demasiado grande, pero para mí,<br>
            el universo entero se resume en el brillo de tus ojos <br>
            y en la calma que siento cuando estoy a tu lado.
        </p>
        <p>Gracias por ser mi refugio y mi aventura favorita.</p>
        <div class="signature">Te amo hoy y siempre.</div>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 5 + 5 + 's';
            heart.style.fontSize = Math.random() * 20 + 10 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 10000);
        }

        setInterval(createHeart, 300);
    </script>
</body>
</html>
